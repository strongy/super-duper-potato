http:
  pprof:
    port: 6060
    enabled: false
  doh:
    routes:
      - GET /dns-query
      - POST /dns-query
      - GET /dns-query/{ClientID}
      - POST /dns-query/{ClientID}
    insecure_enabled: false
  address: 0.0.0.0:3000
  session_ttl: 30d
users:
  - name: admin
    password: PASSWORDHASH
auth_attempts: 5
block_auth_min: 15
http_proxy: ""
language: ""
theme: auto
dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  anonymize_client_ip: false
  ratelimit: 20
  ratelimit_subnet_len_ipv4: 24
  ratelimit_subnet_len_ipv6: 56
  ratelimit_whitelist: []
  refuse_any: true
  upstream_dns:
    - '# 1. Direct Local Forwarding (Fastest, avoids Unbound)'
    - '[/home.marsh1.net/]192.168.0.253'
    - '[/0.168.192.in-addr.arpa/]192.168.0.253'
    - '# 2. Adrian''s House'
    - '[/adrian.marsh1.net/]192.168.6.1'
    - '[/6.168.192.in-addr.arpa/]192.168.6.1'
    - '# 3. Phil''s House'
    - '#[/bandit.fox-magic.co.uk/]192.168.1.1'
    - '#[/1.168.192.in-addr.arpa/]192.168.1.1'
    - '# 4. Wayne''s House'
    - '[/omnikitty.co.uk/]192.168.4.7'
    - '[/4.168.192.in-addr.arpa/]192.168.4.7'
    - '# 5. Everything else to Unbound'
    - 127.0.0.1:5335
  upstream_dns_file: ""
  bootstrap_dns:
    - 127.0.0.1:5335
  fallback_dns:
    - 1.1.1.1
  upstream_mode: parallel
  fastest_timeout: 1s
  allowed_clients: []
  disallowed_clients: []
  blocked_hosts:
    - version.bind
    - id.server
    - hostname.bind
  trusted_proxies:
    - 127.0.0.0/8
    - ::1/128
  cache_enabled: false
  cache_size: 0
  cache_ttl_min: 0
  cache_ttl_max: 0
  cache_optimistic: false
  cache_optimistic_answer_ttl: 30s
  cache_optimistic_max_age: 12h
  bogus_nxdomain: []
  aaaa_disabled: false
  enable_dnssec: false
  edns_client_subnet:
    custom_ip: ""
    enabled: false
    use_custom: false
  max_goroutines: 300
  handle_ddr: true
  ipset: []
  ipset_file: ""
  bootstrap_prefer_ipv6: false
  upstream_timeout: 10s
  private_networks: []
  use_private_ptr_resolvers: false
  local_ptr_upstreams: []
  use_dns64: false
  dns64_prefixes: []
  serve_http3: false
  use_http3_upstreams: false
  serve_plain_dns: true
  hostsfile_enabled: true
  pending_requests:
    enabled: true
tls:
  enabled: true
  server_name: ADGUARD_HOSTNAME
  force_https: true
  port_https: 443
  port_dns_over_tls: 853
  port_dns_over_quic: 784
  port_dnscrypt: 0
  dnscrypt_config_file: ""
  certificate_chain: ""
  private_key: ""
  certificate_path: /config/data/fullchain.pem
  private_key_path: /config/data/privkey.pem
  strict_sni_check: false
querylog:
  dir_path: ""
  ignored: []
  interval: 7d
  size_memory: 1000
  enabled: true
  ignored_enabled: false
  file_enabled: true
statistics:
  dir_path: ""
  ignored: []
  interval: 1d
  enabled: true
  ignored_enabled: false
filters:
  - enabled: true
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
    name: AdGuard DNS filter
    id: 1
  - enabled: false
    url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
    name: AdAway Default Blocklist
    id: 2
  - enabled: true
    url: https://gitlab.com/hagezi/mirror/-/raw/main/dns-blocklists/adblock/tif.txt
    name: HaGeZi's Threat Intelligence Feeds Blocklist
    id: 1728650670
  - enabled: true
    url: https://gitlab.com/hagezi/mirror/-/raw/main/dns-blocklists/adblock/pro.txt
    name: HaGeZi's Multi Pro DNS Blocklist
    id: 1728650671
whitelist_filters: []
user_rules:
  - '@@||challenges.cloudflare.com^$important'
  - '@@||aax-eu.amazon.co.uk^$important'
  - '@@||vortex.data.microsoft.com^$important'
  - '||extreme-dm.com^:block'
  - '||strepsui.dreamhosters.com'
  - '||vercel.app^:block'
  - '||whistlingmoderate.com^:block'
  - '||dazedarticulate.com^:block'
  - '||redr.me^:block'
  - '||ring-gb.shop^:block'
  - '||consequencesjudged.com^:block'
  - '||christeningscholarship.com^:block'
  - '||functionalclam.com^:block'
  - '||prepareplanes.com^:block'
  - '||skysport.wiki^:block'
dhcp:
  enabled: false
  interface_name: eth0
  local_domain_name: lan
  dhcpv4:
    gateway_ip: GATEWAY_IP
    subnet_mask: 255.255.255.0
    range_start: DHCP_START
    range_end: DHCP_FINISH
    lease_duration: 86400
    icmp_timeout_msec: 1000
    options: []
  dhcpv6:
    range_start: ""
    lease_duration: 86400
    ra_slaac_only: false
    ra_allow_slaac: false
filtering:
  blocking_ipv4: ""
  blocking_ipv6: ""
  blocked_services:
    schedule:
      time_zone: Europe/London
    ids: []
  protection_disabled_until: null
  safe_search:
    enabled: false
    bing: true
    duckduckgo: true
    ecosia: true
    google: true
    pixabay: true
    yandex: true
    youtube: true
  blocking_mode: default
  parental_block_host: family-block.dns.adguard.com
  safebrowsing_block_host: standard-block.dns.adguard.com
  rewrites:
    - domain: marsh.3cx.wales
      answer: 192.168.0.44
      enabled: true
  safe_fs_patterns:
    - /opt/AdGuardHome/userfilters/*
    - /config/userfilters/*
  safebrowsing_cache_size: 1048576
  safesearch_cache_size: 1048576
  parental_cache_size: 1048576
  cache_time: 30
  filters_update_interval: 24
  blocked_response_ttl: 10
  filtering_enabled: true
  rewrites_enabled: true
  parental_enabled: false
  safebrowsing_enabled: false
  protection_enabled: true
clients:
  runtime_sources:
    whois: true
    arp: true
    rdns: true
    dhcp: true
    hosts: true
  persistent: []
log:
  enabled: true
  file: ""
  max_backups: 0
  max_size: 100
  max_age: 3
  compress: false
  local_time: false
  verbose: false
os:
  group: ""
  user: ""
  rlimit_nofile: 0
schema_version: 34
